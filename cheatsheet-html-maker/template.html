<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><!-- APP_TITLE --></title>
  <link rel="stylesheet" href="../../assets/variables.css">
  <link rel="stylesheet" href="../../assets/global.css">
  <link rel="stylesheet" href="../../assets/cheatsheet.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <link rel="icon" type="image/png" href="../../assets/brand/cheatsheet.png">
  <link rel="apple-touch-icon" href="../../assets/brand/cheatsheet.png">
  <style>
    :root {
      /*默认列宽*/
      --col-width: <!-- COL_WIDTH -->; 
      --gap: 16px;
    }

    .panel label {
      color: var(--panel-accent);
    }

    .panel .title {
      color: var(--panel-accent);
    }

    .card pre,
    .card pre code[class^="language-"] {
      font-size: 13px;
      line-height: 1.2;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .card h2 {
      font-size: 16px;
    }

    .card,
    .card li,
    .desc {
      font-size: 14px;
      line-height: 1.2;
    }

    .meta-link {
      color: var(--text-link);
    }

    .meta-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <span class="title"><!-- PAGE_TITLE --></span>
      <!-- META_INFO_START -->
      <div class="meta-info">
        <span class="meta-item"><span class="meta-label">版本</span><span class="meta-value"><!-- META_VERSION --></span></span>
        <span class="meta-item"><span class="meta-label">更新日志</span><span class="meta-value"><!-- META_DATE --></span></span>
        <span class="meta-item"><span class="meta-label">GitHub</span><span class="meta-value"><!-- META_GITHUB --></span></span>
      </div>
      <!-- META_INFO_END -->
      <label for="columnWidth">🔧 调整每列宽度：</label>
      <input id="columnWidth" class="slider-bar" type="range" min="300" max="660" value="340">
      <span id="widthVal" class="slider-val">340px</span>
    </div>
    <div class="cheat-columns" id="columns">
      <!-- CHEATSHEET_CONTENT -->
    </div>
  </div>

  <script src="../../assets/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.Prism) {
        Prism.highlightAll();
      }
    });
  </script>
</body>
</html>
