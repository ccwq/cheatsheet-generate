<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function() {
      var key = 'theme-mode';
      var saved = localStorage.getItem(key);
      var resolved = (saved === 'light' || saved === 'dark')
        ? saved
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>
  <title><!-- APP_TITLE --></title>
  <link rel="stylesheet" href="../../assets/variables.css">
  <link rel="stylesheet" href="../../assets/global.css">
  <link rel="stylesheet" href="../../assets/cheatsheet.css">
  <link rel="stylesheet" href="../../assets/tags.css">
  <link id="prism-theme" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <link rel="icon" type="image/png" href="<!-- FAVICON_HREF -->">
  <link rel="apple-touch-icon" href="<!-- FAVICON_HREF -->">
  <style>
    :root {
      /*默认列宽*/
      --col-width: <!-- COL_WIDTH -->; 
      --gap: 16px;
    }

    .panel {
      align-items: stretch;
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px;
      overflow: hidden;
    }

    .panel-main-row,
    .panel-flow-row,
    .panel-title-group,
    .panel-actions,
    .panel-tools {
      display: flex;
      align-items: center;
    }

    .panel-main-row {
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .panel-title-group {
      gap: 10px;
      min-width: 0;
      flex: 0 1 auto;
    }

    .panel .title {
      margin-right: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .panel-actions {
      gap: 8px;
      flex: 0 0 auto;
      min-width: 0;
    }

    .panel-tools {
      gap: 8px;
      margin-left: 2px;
      padding-left: 10px;
      border-left: 1px solid var(--panel-border);
      white-space: nowrap;
    }

    .panel-flow-row {
      gap: 10px;
      min-width: 0;
    }

    .panel .meta-info,
    .panel .meta-tags {
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .panel .meta-info::-webkit-scrollbar,
    .panel .meta-tags::-webkit-scrollbar {
      display: none;
    }

    .panel .meta-info {
      flex: 1 1 auto;
      margin-top: 0;
      min-width: 0;
      flex-wrap: nowrap;
      gap: 6px;
    }

    .panel .meta-tags {
      flex: 1 1 auto;
      min-width: 0;
      flex-wrap: nowrap;
      padding-bottom: 1px;
    }

    .panel .meta-item,
    .panel .detail-tag,
    .panel .meta-link,
    .panel label,
    .panel .slider-val,
    .panel .btn {
      white-space: nowrap;
    }

    .panel .meta-action {
      padding: 4px 8px;
    }

    .panel .slider-bar {
      min-width: 118px;
      width: 130px;
      margin-right: 0;
    }

    .panel .slider-val {
      min-width: 38px;
      margin-left: 0;
    }

    @media (max-width: 1199px) {
      .panel-main-row {
        align-items: flex-start;
      }

      .panel-title-group {
        padding-top: 2px;
      }

      .panel-actions {
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .panel-tools {
        order: 10;
        width: 100%;
        justify-content: flex-end;
        padding-left: 0;
        border-left: 0;
      }
    }

    @media (max-width: 767px) {
      .panel {
        padding: 8px;
      }

      .panel-main-row {
        flex-wrap: wrap;
        gap: 8px;
      }

      .panel-title-group {
        flex: 1 1 100%;
        padding-top: 0;
      }

      .home-link span {
        display: none;
      }

      .panel-actions {
        gap: 6px;
        justify-content: flex-start;
        flex: 1 1 100%;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .panel-actions::-webkit-scrollbar {
        display: none;
      }

      .panel .meta-action {
        padding: 3px 6px;
      }

      .panel-tools {
        flex: 0 0 auto;
        order: initial;
        width: auto;
        gap: 6px;
      }
    }

    @media (max-width: 660px) {
      .panel-tools {
        width: auto;
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="panel-main-row">
        <div class="panel-title-group">
          <a class="home-link" href="../../index.html" aria-label="返回首页" title="返回首页">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M10 19v-4h4v4h5v-8h3L12 2 2 11h3v8z"/>
            </svg>
            <span>首页</span>
          </a>
          <span class="title"><!-- PAGE_TITLE --></span>
        </div>
      <!-- META_INFO_START -->
        <div class="meta-info">
          <span class="meta-item"><span class="meta-label"></span><span class="meta-value"><!-- META_VERSION --></span></span>
          <span class="meta-item"><span class="meta-label"></span><span class="meta-value"><!-- META_DATE --></span></span>
          <span class="meta-item"><span class="meta-label"></span><span class="meta-value"><!-- META_GITHUB --></span></span>
        </div>
        <div class="panel-actions">
          <span class="meta-item meta-action"><span class="meta-label"></span><span class="meta-value"><!-- META_ZREAD --></span></span>
          <span class="meta-item meta-action"><span class="meta-label"></span><span class="meta-value"><!-- META_CODEWIKI --></span></span>
          <div class="panel-tools">
            <label for="columnWidth">🔧 调整每列宽度：</label>
            <input id="columnWidth" class="slider-bar" type="range" min="300" max="660" value="340">
            <span id="widthVal" class="slider-val">340px</span>
            <span class="sep"></span>
            <button id="themeToggleBtn" class="btn" type="button" aria-pressed="false" title="切换主题">🌙 暗色</button>
          </div>
        </div>
      </div>
      <div class="panel-flow-row">
        <!-- META_TAGS -->
      </div>
      <!-- META_INFO_END -->
    </div>
    <div class="cheat-columns" id="columns">
      <!-- CHEATSHEET_CONTENT -->
    </div>
  </div>

  <script src="../../assets/tag-chip.js"></script>
  <script src="../../assets/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.Prism) {
        Prism.highlightAll();
      }
    });
  </script>
</body>
</html>
