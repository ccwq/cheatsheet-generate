<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function() {
      var key = 'theme-mode';
      var saved = localStorage.getItem(key);
      var resolved = (saved === 'light' || saved === 'dark')
        ? saved
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>
  <title><!-- APP_TITLE --></title>
  <link rel="stylesheet" href="../../assets/variables.css">
  <link rel="stylesheet" href="../../assets/global.css">
  <link rel="stylesheet" href="../../assets/cheatsheet.css">
  <link rel="stylesheet" href="../../assets/tags.css">
  <link id="prism-theme" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <link rel="icon" type="image/png" href="../../assets/brand/cheatsheet.png">
  <link rel="apple-touch-icon" href="../../assets/brand/cheatsheet.png">
  <style>
    :root {
      /*默认列宽*/
      --col-width: <!-- COL_WIDTH -->; 
      --gap: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <a class="home-link" href="../../index.html" aria-label="返回首页" title="返回首页">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M10 19v-4h4v4h5v-8h3L12 2 2 11h3v8z"/>
        </svg>
        <span>首页</span>
      </a>
      <span class="title"><!-- PAGE_TITLE --></span>
      <!-- META_INFO_START -->
      <div class="meta-info">
        <span class="meta-item"><span class="meta-label"></span><span class="meta-value"><!-- META_VERSION --></span></span>
        <span class="meta-item"><span class="meta-label"></span><span class="meta-value"><!-- META_DATE --></span></span>
        <span class="meta-item"><span class="meta-label"></span><span class="meta-value"><!-- META_GITHUB --></span></span>
        <span class="meta-item"><span class="meta-label"></span><span class="meta-value"><!-- META_ZREAD --></span></span>
      </div>
      <!-- META_TAGS -->
      <!-- META_INFO_END -->
      <label for="columnWidth">🔧 调整每列宽度：</label>
      <input id="columnWidth" class="slider-bar" type="range" min="300" max="660" value="340">
      <span id="widthVal" class="slider-val">340px</span>
      <span class="sep"></span>
      <button id="themeToggleBtn" class="btn" type="button" aria-pressed="false" title="切换主题">🌙 暗色</button>
    </div>
    <div class="cheat-columns" id="columns">
      <!-- CHEATSHEET_CONTENT -->
    </div>
  </div>

  <script src="../../assets/tag-chip.js"></script>
  <script src="../../assets/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.Prism) {
        Prism.highlightAll();
      }
    });
  </script>
</body>
</html>
